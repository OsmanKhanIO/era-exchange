<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#09090b">
  <title>ERA Exchange | Market Analytics</title>

  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="ambient-glow glow-1"></div>
  <div class="ambient-glow glow-2"></div>

  <div id="toast-container" aria-live="assertive"></div>

  <div class="wrapper">
    <!-- Updated Header with Logo -->
    <header>
      <div class="logo-container">
        <img src="logo.png" alt="EA Monogram" class="brand-logo">
        <span class="gradient-text">ERA Exchange</span>
      </div>
    </header>
    
    <div class="app-layout">
      <!-- Converter Controls -->
      <form id="converter-form" onsubmit="event.preventDefault()">
        <div class="amount">
          <p>Amount to Convert</p>
          <div class="input-wrapper">
            <input type="number" id="amount-input" value="1" min="0" aria-label="Enter amount to convert">
          </div>
        </div>
        
        <div class="drop-list">
          <div class="from">
            <p>From</p>
            <!-- Custom Dropdown -->
            <div class="custom-select" id="from-currency" tabindex="0">
              <div class="selected-item">
                <div class="selected-content">
                  <img src="" alt="flag">
                  <span>Loading...</span>
                </div>
                <i class="fas fa-chevron-down arrow"></i>
              </div>
              <div class="dropdown-menu">
                <div class="search-box">
                  <i class="fas fa-search"></i>
                  <input type="text" placeholder="Search currency...">
                </div>
                <ul class="options-list"></ul>
              </div>
            </div>
          </div>
          
          <div class="icon" id="swap-icon" role="button" tabindex="0" aria-label="Swap currencies">
            <i class="fas fa-exchange-alt"></i>
          </div>
          
          <div class="to">
            <p>To</p>
            <!-- Custom Dropdown -->
            <div class="custom-select" id="to-currency" tabindex="0">
              <div class="selected-item">
                <div class="selected-content">
                  <img src="" alt="flag">
                  <span>Loading...</span>
                </div>
                <i class="fas fa-chevron-down arrow"></i>
              </div>
              <div class="dropdown-menu">
                <div class="search-box">
                  <i class="fas fa-search"></i>
                  <input type="text" placeholder="Search currency...">
                </div>
                <ul class="options-list"></ul>
              </div>
            </div>
          </div>
        </div>
        
        <div class="exchange-rate" id="exchange-rate-display" aria-live="polite">Initializing engine...</div>
        <div id="quick-compare" class="quick-compare-strip"></div>
      </form>

      <!-- Chart Display -->
      <div class="chart-container">
        <div class="chart-header">
          <p class="chart-title" id="chart-title">Market Trend</p>
          <span class="live-indicator"><span class="pulse"></span> Live</span>
        </div>
        <div class="canvas-wrapper">
          <canvas id="historyChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- Ghost Footer -->
  <div class="ghost-footer">
    <p class="disclaimer"><strong>Disclaimer:</strong> Market data is sourced via third-party APIs and provided for informational purposes only.</p>
    <p class="credit">Designed & Developed by <a href="https://your-portfolio-link.com" target="_blank" rel="noopener noreferrer">Osman Khan</a></p>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
